<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifeline AI | Sign Up</title>
    <link rel="stylesheet" href="../css/signup.css">
    <link rel="icon" type="image/png" href="assests/logo.png.png">
</head>
<body>
<div class="container">
<!-- LEFT SIDE -->
    <div class="left">
        <h1>❤️ Lifeline AI</h1>
        <p>Create your emergency health profile and allow doctors to access your critical medical data instantly during emergencies.</p>
        <ul>
            <li>✔ Secure medical records</li>
            <li>✔ Emergency QR access</li>
            <li>✔ Faster hospital treatment</li>
        </ul>
    </div>
<!-- RIGHT SIDE -->
    <div class="right">
        <form class="signup-form">
            <h2>Create Account</h2>
            <div class="input-group">
                <input type="text" placeholder="" required>
                <label>Full Name</label>
            </div>
            <div class="input-group">
                <input type="email" placeholder="" required>
                <label>Email</label>

            </div>
            <div class="input-group">
                <input type="password" placeholder="" required>
                <label>Password</label>
            </div>
            <div class="input-group">
                <input type="password" placeholder="" required>
                <label>Confirm Password</label>
            </div>
            <button class="signup-btn">Create Account</button>
            <p class="login-text">Already have an account?<a href="../pages/login.html">Login</a></p>
        </form>
    </div>
</div>
</body>
</html>
